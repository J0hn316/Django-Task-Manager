<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Delete Task</title>
  </head>

  <body>
    <p>
      <a href="{% url 'tasks:project_detail' task.project.pk %}">Cancel</a>
    </p>

    <h1>Delete Task</h1>

    <p>Are you sure you want to delete "{{ task.title }}"?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
    </form>
  </body>

</html>
