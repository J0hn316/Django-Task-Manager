{% extends "tasks/base.html" %} {% block title %}Delete Task | Django Task
Manager{% endblock %} {% block content %}
<section
  class="mx-auto max-w-2xl rounded-2xl border border-red-200 bg-white p-6 shadow-sm"
>
  <p class="text-sm font-semibold uppercase tracking-wide text-red-600">
    Danger Zone
  </p>

  <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">
    Delete Task
  </h1>

  <p class="mt-4 leading-7 text-slate-600">
    Are you sure you want to delete
    <strong class="font-semibold text-slate-950">"{{ task.title }}"</strong>?
  </p>

  <p class="mt-3 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700">
    This action cannot be undone.
  </p>

  <form method="post" class="mt-6">
    {% csrf_token %}

    <div class="flex flex-wrap gap-2">
      <button
        type="submit"
        class="inline-flex items-center rounded-lg bg-red-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-red-700"
      >
        Yes, Delete
      </button>

      <a
        href="{% url 'tasks:project_detail' task.project.pk %}"
        class="inline-flex items-center rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50"
      >
        Cancel
      </a>
    </div>
  </form>
</section>
{% endblock %}
