{% extends "tasks/base.html" %} {% block title %}{{ title }} | Django Task
Manager{% endblock %} {% block content %}
<p>
  <a href="{% url 'tasks:project_detail' project.pk %}">← Back to Project</a>
</p>

<section class="form-card">
  <h1>{{ title }}</h1>

  <p><strong>Project:</strong> {{ project.name }}</p>

  <form method="post">
    {% csrf_token %} {{ form.as_p }}

    <div class="actions">
      <button type="submit">Save Task</button>
      <a
        href="{% url 'tasks:project_detail' project.pk %}"
        class="button-secondary"
        >Cancel</a
      >
    </div>
  </form>
</section>
{% endblock %}
