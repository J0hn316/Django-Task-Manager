<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Delete Project</title>
  </head>

  <body>
    <p>
      <a href="{% url 'tasks:project_detail' project.pk %}">Cancel</a>
    </p>

    <h1>Delete Project</h1>

    <p>Are you sure you want to delete "{{ project.name }}"?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
    </form>
  </body>

</html>
