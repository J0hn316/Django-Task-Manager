{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Django Task Manager{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tasks/output.css' %}" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-800 bg-slate-950 text-white">
      <div
        class="mx-auto flex w-full max-w-6xl flex-col gap-4 px-4 py-4 sm:flex-row sm:items-center sm:justify-between"
      >
        <div>
          <a
            href="{% url 'tasks:home' %}"
            class="text-xl font-bold tracking-tight text-white hover:text-blue-300"
          >
            Task Manager
          </a>
          <p class="mt-1 text-sm text-slate-300">
            Django project and task tracking
          </p>
        </div>

        <nav class="flex flex-wrap gap-2">
          <a
            href="{% url 'tasks:home' %}"
            class="rounded-md px-3 py-2 text-sm font-medium text-slate-200 hover:bg-slate-800 hover:text-white"
          >
            Home
          </a>

          <a
            href="{% url 'tasks:project_list' %}"
            class="rounded-md px-3 py-2 text-sm font-medium text-slate-200 hover:bg-slate-800 hover:text-white"
          >
            Projects
          </a>

          <a
            href="{% url 'tasks:project_create' %}"
            class="rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700"
          >
            New Project
          </a>
        </nav>
      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl px-4 py-8">
      {% if messages %}
      <div class="mb-6 space-y-3">
        {% for message in messages %}
        <div
          class="rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm font-medium text-green-800"
        >
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %} {% block content %} {% endblock %}
    </main>
  </body>
</html>
