{% extends "tasks/base.html" %} {% block title %}{{ title }} | Django Task
Manager{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'tasks:project_list' %}"
    class="text-sm font-semibold text-blue-600 hover:text-blue-700"
  >
    ← Back to Projects
  </a>
</div>

<section
  class="mx-auto max-w-2xl rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"
>
  <p class="text-sm font-semibold uppercase tracking-wide text-blue-600">
    Project Form
  </p>

  <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">
    {{ title }}
  </h1>

  <form method="post" class="mt-6 space-y-5">
    {% csrf_token %} {{ form.as_p }}

    <div class="flex flex-wrap gap-2 pt-2">
      <button
        type="submit"
        class="inline-flex items-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700"
      >
        Save Project
      </button>

      <a
        href="{% url 'tasks:project_list' %}"
        class="inline-flex items-center rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50"
      >
        Cancel
      </a>
    </div>
  </form>
</section>
{% endblock %}
